<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ÉlecDraw — CHEKELEC</title>
<style>
:root{
  --a:#17b6c4;--a2:#0e8f9a;--warn:#e06020;--ok:#27ae60;
  --bg:#080b12;--s1:#0f1220;--s2:#151929;--s3:#1c2133;
  --b1:#222640;--b2:#2d3252;--b3:#3a4068;
  --t1:#e8eaf0;--t2:#9aa0b8;--t3:#555d7a;
  --sb:50px;--hdr:42px;
  --font:ui-monospace,'SF Mono',SFMono-Regular,Menlo,monospace;
  --font2:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  --shadow:0 8px 32px rgba(0,0,0,.7);
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:-webkit-fill-available;height:100%;}
body{background:var(--bg);font-family:var(--font);color:var(--t1);height:100vh;height:-webkit-fill-available;overflow:hidden;user-select:none;}

/* HEADER */
header{height:var(–hdr);background:var(–s1);border-bottom:1px solid var(–b1);
display:flex;align-items:center;padding:0 12px;gap:10px;z-index:30;position:relative;}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.logo-text{font-family:var(–font2);font-size:14px;font-weight:700;color:var(–a);}
.logo-sub{font-size:8px;color:var(–t3);letter-spacing:2px;text-transform:uppercase;}
.hdiv{width:1px;height:20px;background:var(–b2);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:5px;flex-wrap:nowrap;}
.hbtn{display:flex;align-items:center;gap:4px;padding:5px 9px;background:var(–s2);
border:1px solid var(–b2);color:var(–t2);font-size:10px;border-radius:5px;cursor:pointer;
font-family:var(–font);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.hbtn:hover{background:var(–b1);color:var(–a);border-color:var(–a);}
.hbtn.accent{background:var(–a);color:#000;border-color:var(–a);font-weight:500;}
.hbtn.accent:hover{background:var(–a2);}
.hbtn:disabled{opacity:.3;cursor:default;}
#coords{font-size:9px;color:var(–t3);letter-spacing:1px;min-width:80px;text-align:right;flex-shrink:0;}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - var(–hdr));height:calc(-webkit-fill-available - var(–hdr));position:relative;flex:1;min-height:0;}

/* LEFT SIDEBAR — icônes catégories */
.sidebar{width:var(–sb);background:var(–s1);border-right:1px solid var(–b1);
display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:2px;
flex-shrink:0;overflow:hidden;z-index:20;position:relative;}
.cat-btn{width:38px;height:38px;border-radius:7px;display:flex;flex-direction:column;
align-items:center;justify-content:center;cursor:pointer;color:var(–t3);
transition:all .15s;position:relative;font-size:17px;gap:1px;}
.cat-btn:hover,.cat-btn.active{background:var(–s3);color:var(–a);}
.cat-btn .clabel{font-size:6px;letter-spacing:.3px;color:inherit;text-transform:uppercase;line-height:1;}
.cat-tip{position:absolute;left:46px;top:50%;transform:translateY(-50%);
background:var(–s3);border:1px solid var(–b2);color:var(–t1);
font-size:10px;padding:4px 8px;border-radius:4px;white-space:nowrap;
pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;}
.cat-btn:hover .cat-tip{opacity:1;}
.sb-sep{width:28px;height:1px;background:var(–b1);flex-shrink:0;}

/* SYMBOL FLYOUT */
.sym-panel{position:absolute;left:var(–sb);top:0;bottom:0;width:195px;
background:var(–s2);border-right:1px solid var(–b1);
display:flex;flex-direction:column;z-index:15;
transform:translateX(-200px);transition:transform .2s ease;
box-shadow:4px 0 20px rgba(0,0,0,.5);}
.sym-panel.open{transform:translateX(0);}
.sp-head{padding:10px 12px 7px;border-bottom:1px solid var(–b1);
display:flex;align-items:center;justify-content:space-between;}
.sp-title{font-family:var(–font2);font-size:12px;color:var(–a);}
.sp-close{background:none;border:none;color:var(–t3);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:3px;}
.sp-close:hover{background:var(–b1);color:var(–t1);}
.sp-search{margin:7px 9px;padding:5px 9px;background:var(–s1);border:1px solid var(–b1);
border-radius:5px;color:var(–t1);font-family:var(–font);font-size:10px;outline:none;transition:border .15s;}
.sp-search:focus{border-color:var(–a);}
.sp-search::placeholder{color:var(–t3);}
.sp-list{flex:1;overflow-y:auto;padding:3px 6px 10px;}
.sp-list::-webkit-scrollbar{width:3px;}
.sp-list::-webkit-scrollbar-thumb{background:var(–b2);}
.sp-item{display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:5px;
cursor:pointer;transition:all .12s;border:1px solid transparent;}
.sp-item:hover{background:var(–s3);border-color:var(–b1);}
.sp-item.active{background:var(–b1);border-color:var(–a);}
.sp-item span{font-size:10px;color:var(–t2);}
.sp-item.active span{color:var(–t1);}

/* CANVAS */
.canvas-wrap{flex:1;position:relative;overflow:hidden;touch-action:none;min-height:0;}
#cvs{position:absolute;top:0;left:0;width:100%;height:100%;display:block;touch-action:none;}

/* TOOLBAR COMPACT/EXPANDED */
.toolbar-wrap{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:25;}
.toolbar{background:var(–s2);border:1px solid var(–b2);border-radius:12px;
box-shadow:var(–shadow);overflow:hidden;transition:all .2s ease;}

/* compact state */
.tb-compact{display:flex;align-items:center;gap:4px;padding:5px 8px;}
.tb-compact-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;
background:transparent;border:none;color:var(–t2);font-size:11px;cursor:pointer;
font-family:var(–font);transition:all .15s;}
.tb-compact-btn:hover{background:var(–s3);color:var(–t1);}
.tb-compact-btn.active{background:var(–a);color:#000;}
.tb-expand{background:none;border:none;color:var(–t3);cursor:pointer;font-size:16px;
padding:4px 6px;border-radius:5px;transition:all .15s;margin-left:2px;}
.tb-expand:hover{background:var(–b1);color:var(–a);}

/* expanded state */
.tb-expanded{display:none;flex-direction:column;gap:0;border-top:1px solid var(–b1);}
.toolbar.open .tb-expanded{display:flex;}
.tb-row{display:flex;align-items:center;gap:2px;padding:5px 6px;border-bottom:1px solid var(–b1);}
.tb-row:last-child{border-bottom:none;}
.tb-row-label{font-size:8px;color:var(–t3);letter-spacing:1px;text-transform:uppercase;
width:55px;flex-shrink:0;padding-left:4px;}
.tbtn{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 10px;
border-radius:7px;background:transparent;border:none;color:var(–t3);
font-size:14px;cursor:pointer;transition:all .15s;min-width:46px;}
.tbtn .tl{font-size:8px;color:inherit;font-family:var(–font);text-transform:uppercase;letter-spacing:.3px;}
.tbtn .tk{font-size:7px;color:var(–t3);background:var(–b1);padding:1px 3px;border-radius:2px;margin-top:1px;}
.tbtn:hover{background:var(–s3);color:var(–t1);}
.tbtn.active{background:var(–a);color:#000;}
.tbtn.active .tl{color:rgba(0,0,0,.6);}
.tbtn.active .tk{background:rgba(0,0,0,.15);color:rgba(0,0,0,.5);}
.tbtn.red:hover{background:#3a1010;color:#ff7070;}
.tb-sep-v{width:1px;height:28px;background:var(–b2);flex-shrink:0;margin:0 2px;}

/* Wire color dots in toolbar */
.wc-wrap{display:flex;gap:5px;align-items:center;padding:0 4px;}
.wc{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;
transition:all .15s;position:relative;}
.wc:hover{transform:scale(1.2);}
.wc.active{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,.3);}
.wc-tooltip{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
background:var(–s3);border:1px solid var(–b2);color:var(–t1);
font-size:9px;padding:3px 7px;border-radius:4px;white-space:nowrap;
opacity:0;pointer-events:none;transition:opacity .15s;z-index:50;}
.wc:hover .wc-tooltip{opacity:1;}

/* CTX PANEL */
.ctx-panel{position:absolute;background:var(–s2);border:1px solid var(–b2);
border-radius:10px;padding:10px 11px;width:195px;
box-shadow:var(–shadow);z-index:40;display:none;}
.ctx-panel.show{display:block;}
.ctx-title{font-family:var(–font2);font-size:11px;color:var(–a);
margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.ctx-title button{background:none;border:none;color:var(–t3);cursor:pointer;font-size:12px;padding:0 3px;}
.ctx-title button:hover{color:var(–t1);}
.ctx-row{display:flex;gap:4px;margin-bottom:4px;}
.cbtn{flex:1;padding:6px 4px;background:var(–s3);border:1px solid var(–b2);
color:var(–t2);font-size:9px;border-radius:5px;cursor:pointer;
font-family:var(–font);transition:all .12s;text-align:center;}
.cbtn:hover{background:var(–b1);color:var(–a);border-color:var(–a);}
.cbtn.danger:hover{background:#3a1010;color:#ff6060;border-color:#6a2020;}
.ctx-label-wrap{display:flex;gap:4px;align-items:center;margin-top:6px;}
.ctx-inp{flex:1;padding:5px 8px;background:var(–s1);border:1px solid var(–b1);
border-radius:5px;color:var(–t1);font-family:var(–font);font-size:10px;outline:none;}
.ctx-inp:focus{border-color:var(–a);}
.ctx-ok{padding:5px 9px;background:var(–a);border:none;border-radius:5px;
color:#000;font-size:10px;cursor:pointer;font-weight:500;font-family:var(–font);}

/* LEGEND */
.legend{position:absolute;top:8px;right:8px;
background:rgba(15,18,32,.96);border:1px solid var(–b2);
border-radius:8px;padding:11px 13px;min-width:165px;
z-index:25;display:none;backdrop-filter:blur(8px);}
.legend.show{display:block;}
.leg-title{font-family:var(–font2);font-size:9px;color:var(–a);
letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
.leg-row{display:flex;justify-content:space-between;align-items:center;
font-size:10px;color:var(–t2);padding:2px 0;border-bottom:1px solid var(–b1);}
.leg-row:last-child{border:none;}
.leg-n{color:var(–t1);font-weight:500;}

/* TOAST */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(8px);
background:var(–s3);border:1px solid var(–b2);border-radius:7px;
padding:7px 14px;font-size:10px;color:var(–t1);
opacity:0;transition:all .25s;z-index:100;pointer-events:none;box-shadow:var(–shadow);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(–ok);color:var(–ok);}
.toast.warn{border-color:var(–warn);color:var(–warn);}

/* MODE indicator */
.mode-badge{position:absolute;top:8px;left:8px;
background:rgba(23,182,196,.15);border:1px solid var(–a);
color:var(–a);font-size:9px;padding:3px 9px;border-radius:20px;
letter-spacing:1px;text-transform:uppercase;z-index:20;pointer-events:none;
display:none;}
.mode-badge.show{display:block;}
</style>

<script>
const NS='http://www.w3.org/2000/svg';

// ════════════════════════════════════════
// WIRE COLORS
// ════════════════════════════════════════
const WCOLS=[
  {id:'phase', label:'Phase (L)',  color:'#cc3311'},
  {id:'neutre',label:'Neutre (N)', color:'#3377cc'},
  {id:'pe',    label:'Terre (PE)', color:'#22993a'},
  {id:'cmd',   label:'Commande',   color:'#bb8800'},
  {id:'ret',   label:'Retour',     color:'#8844cc'},
  {id:'gris',  label:'Neutre 2',   color:'#8899aa'},
];
let curWC=WCOLS[0];

// ════════════════════════════════════════
// CATEGORIES + SYMBOLES
// ════════════════════════════════════════
const CATS=[
  {id:'prises',    label:'Prises',       icon:'🔌'},
  {id:'commandes', label:'Commandes',    icon:'💡'},
  {id:'eclairage', label:'Éclairage',    icon:'☀️'},
  {id:'protection',label:'Protection',   icon:'🛡'},
  {id:'distrib',   label:'Distribution', icon:'⚡'},
  {id:'equip',     label:'Équipements',  icon:'🏠'},
  {id:'reseaux',   label:'Réseaux',      icon:'🌐'},
];

// helper SVG
function sv(parent,tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs||{}))e.setAttribute(k,v);
  parent.appendChild(e);return e;
}

const SYMS=[
  // ── PRISES ─────────────────────────────
  // Prise repiquable : L-in, L-out, N-in, N-out
  {id:'prise',label:'Prise 2P (repiquable)',cat:'prises',
   ports:[{id:'L-in',x:-22,y:-8,col:'#cc3311'},{id:'L-out',x:22,y:-8,col:'#cc3311'},
          {id:'N-in',x:-22,y:8,col:'#3377cc'},{id:'N-out',x:22,y:8,col:'#3377cc'}],
   draw(g){
     sv(g,'circle',{cx:0,cy:0,r:13});
     sv(g,'line',{x1:0,y1:-13,x2:0,y2:13});
     sv(g,'line',{x1:-5,y1:-5,x2:-5,y2:5});
     sv(g,'line',{x1:5,y1:-5,x2:5,y2:5});
     // indicateur neutre bleu
     sv(g,'line',{x1:-13,y1:6,x2:13,y2:6,stroke:'#3377cc','stroke-width':'1.2'});
   }},
  {id:'prise20',label:'Prise 20A (repiquable)',cat:'prises',
   ports:[{id:'L-in',x:-22,y:-8,col:'#cc3311'},{id:'L-out',x:22,y:-8,col:'#cc3311'},
          {id:'N-in',x:-22,y:8,col:'#3377cc'},{id:'N-out',x:22,y:8,col:'#3377cc'}],
   draw(g){
     sv(g,'circle',{cx:0,cy:0,r:13});
     sv(g,'circle',{cx:0,cy:0,r:5,stroke:'#17b6c4'});
     sv(g,'line',{x1:0,y1:-13,x2:0,y2:13});
     sv(g,'line',{x1:-5,y1:-5,x2:-5,y2:5});
     sv(g,'line',{x1:5,y1:-5,x2:5,y2:5});
     sv(g,'line',{x1:-13,y1:6,x2:13,y2:6,stroke:'#3377cc','stroke-width':'1.2'});
   }},
  {id:'priseUSB',label:'Prise USB',cat:'prises',
   ports:[{id:'L-in',x:-22,y:0},{id:'N-in',x:22,y:0}],
   draw(g){
     sv(g,'circle',{cx:0,cy:0,r:13});
     sv(g,'rect',{x:-5,y:-8,width:10,height:8,rx:2});
     sv(g,'line',{x1:0,y1:0,x2:0,y2:8});
   }},
  // ── COMMANDES ──────────────────────────
  {id:'inter',label:'Interrupteur',cat:'commandes',
   ports:[{id:'A',x:-22,y:0},{id:'B',x:22,y:0}],
   draw(g){
     sv(g,'circle',{cx:-12,cy:0,r:3,fill:'#d8d8d8'});

const cvs=document.getElementById('cvs');
const vpG=document.getElementById('vp');

const symLayer=document.getElementById('symLayer');

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function applyVP(){vpG.setAttribute('transform',`translate(${vpX},${vpY}) scale(${vpScale})`);}
function c2w(cx,cy){const r=cvs.getBoundingClientRect();return{x:(cx-r.left-vpX)/vpScale,y:(cy-r.top-vpY)/vpScale};}
const SN=20;
function sn(v){return Math.round(v/SN)*SN;}
function snp(p){return{x:sn(p.x),y:sn(p.y)};}
function toast(msg,t='',dur=2200){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(t?' '+t:'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),dur);
}

// ════════════════════════════════════════
// UNDO/REDO
// ════════════════════════════════════════
function snapState(){
  return JSON.stringify({
    instances:instances.map(i=>({id:i.id,type:i.type,x:i.x,y:i.y,rot:i.rot||0,flip:i.flip||false,label:i.label||''})),
    wires:wires.map(w=>({id:w.id,fromInst:w.fromInst,fromPort:w.fromPort,toInst:w.toInst,toPort:w.toPort,color:w.color})),
    nid
  });
}
function pushUndo(){
  undoStack.push(snapState());if(undoStack.length>60)undoStack.shift();
  redoStack=[];updUndoBtns();
}
function restoreState(raw){
  const s=JSON.parse(raw);
  wireLayer.innerHTML='';symLayer.innerHTML='';portLayer.innerHTML='';
  instances=[];wires=[];selInst=null;wireFrom=null;tempWire=null;nid=s.nid;
  s.instances.forEach(d=>{const i={...d,el:null};instances.push(i);renderInst(i);});
  s.wires.forEach(d=>{
    const iA=instances.find(i=>i.id===d.fromInst),iB=instances.find(i=>i.id===d.toInst);
    if(!iA||!iB)return;
    const sA=SYMS.find(s=>s.id===iA.type),sB=SYMS.find(s=>s.id===iB.type);
    const pA=sA?.ports.find(p=>p.id===d.fromPort),pB=sB?.ports.find(p=>p.id===d.toPort);
    if(pA&&pB)commitWire(iA,pA,iB,pB,d.color,d.id);
  });
  refreshPorts();updateLegend();updUndoBtns();hideCtx();
}
function undo(){if(undoStack.length<2)return;redoStack.push(undoStack.pop());restoreState(undoStack[undoStack.length-1]);toast('Annulé');}
function redo(){if(!redoStack.length)return;const s=redoStack.pop();undoStack.push(s);restoreState(s);toast('Refait');}
function updUndoBtns(){
  document.getElementById('undoBtn').disabled=undoStack.length<2;
  document.getElementById('redoBtn').disabled=!redoStack.length;
}

// ════════════════════════════════════════
// MODE
// ════════════════════════════════════════
function setMode(m){
  mode=m;wireFrom=null;
  if(tempWire){tempWire.remove();tempWire=null;}
  if(ghostEl&&m!=='place'){ghostEl.remove();ghostEl=null;}
  // compact toolbar buttons
  document.querySelectorAll('.tb-compact-btn').forEach(b=>b.classList.remove('active'));
  const cb=document.getElementById('tbc-'+m);if(cb)cb.classList.add('active');
  // expanded toolbar buttons
  document.querySelectorAll('.tbtn[id^="tb-"]').forEach(b=>b.classList.remove('active'));
  const eb=document.getElementById('tb-'+m);if(eb)eb.classList.add('active');
  // badge
  const badge=document.getElementById('modeBadge');
  const labels={select:'Sélection',wire:'Mode Fil — cliquer un port',delete:'Mode Suppression'};
  if(m==='select'){badge.classList.remove('show');}
  else{badge.textContent=labels[m]||m;badge.classList.add('show');}
  cvs.style.cursor=m==='wire'||m==='delete'?'crosshair':'default';
  refreshPorts();
}

// ════════════════════════════════════════
// TOOLBAR EXPAND
// ════════════════════════════════════════
function toggleToolbar(){
  tbOpen=!tbOpen;
  document.getElementById('toolbar').classList.toggle('open',tbOpen);
  document.getElementById('tbExpandBtn').textContent=tbOpen?'✕':'⋯';
}
// close toolbar when clicking outside
document.addEventListener('pointerdown',ev=>{
  if(tbOpen&&!document.querySelector('.toolbar-wrap').contains(ev.target)){
    tbOpen=false;document.getElementById('toolbar').classList.remove('open');
    document.getElementById('tbExpandBtn').textContent='⋯';
  }
},{capture:true});

// ════════════════════════════════════════
// WIRE COLORS UI
// ════════════════════════════════════════
function buildWCols(){
  const wrap=document.getElementById('wcWrap');
  WCOLS.forEach(wc=>{
    const d=document.createElement('div');
    d.className='wc'+(wc===curWC?' active':'');
    d.style.background=wc.color;
    d.innerHTML=`<span class="wc-tooltip">${wc.label}</span>`;
    d.onclick=()=>{curWC=wc;document.querySelectorAll('.wc').forEach(x=>x.classList.remove('active'));d.classList.add('active');};
    wrap.appendChild(d);
  });
}

// ════════════════════════════════════════
// SIDEBAR + SYMBOL PANEL
// ════════════════════════════════════════
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  CATS.forEach(cat=>{
    const btn=document.createElement('div');
    btn.className='cat-btn';btn.id='cat-'+cat.id;
    btn.innerHTML=`${cat.icon}<span class="clabel">${cat.label.slice(0,5)}</span><span class="cat-tip">${cat.label}</span>`;
    btn.onclick=()=>openPanel(cat);
    sb.appendChild(btn);
    if(cat.id==='distrib'){const sep=document.createElement('div');sep.className='sb-sep';sb.appendChild(sep);}
  });
}
function openPanel(cat){
  const already=selCat?.id===cat.id&&document.getElementById('symPanel').classList.contains('open');
  if(already){closePanel();return;}
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cat-'+cat.id).classList.add('active');
  selCat=cat;
  document.getElementById('spTitle').textContent=cat.label;
  document.getElementById('spSearch').value='';
  filterSyms(cat.id);
  document.getElementById('symPanel').classList.add('open');
}
function closePanel(){
  document.getElementById('symPanel').classList.remove('open');
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  selCat=null;
}
function filterSyms(forceCat){
  const q=document.getElementById('spSearch').value.toLowerCase();
  const catId=forceCat||selCat?.id;
  const list=document.getElementById('spList');list.innerHTML='';
  SYMS.filter(s=>(!catId||s.cat===catId)&&(!q||s.label.toLowerCase().includes(q))).forEach(sym=>{
    const div=document.createElement('div');
    div.className='sp-item'+(sym.id===selSymId?' active':'');
    div.id='sp-'+sym.id;
    const psvg=document.createElementNS(NS,'svg');
    psvg.setAttribute('width','30');psvg.setAttribute('height','28');psvg.setAttribute('viewBox','-22 -18 44 36');
    const pg=document.createElementNS(NS,'g');
    pg.setAttribute('stroke','#17b6c4');pg.setAttribute('stroke-width','1.5');
    pg.setAttribute('fill','none');pg.setAttribute('stroke-linecap','round');pg.setAttribute('stroke-linejoin','round');
    sym.draw(pg);psvg.appendChild(pg);
    const span=document.createElement('span');span.textContent=sym.label;
    div.appendChild(psvg);div.appendChild(span);
    div.onclick=()=>{
      selSymId=sym.id;
      document.querySelectorAll('.sp-item').forEach(b=>b.classList.remove('active'));
      div.classList.add('active');
      setMode('place');
      closePanel(); // ← ferme le panel après sélection
    };
    list.appendChild(div);
  });
}

// ════════════════════════════════════════
// PORT WORLD
// ════════════════════════════════════════
function portWorld(inst,port){
  const rad=(inst.rot||0)*Math.PI/180,fl=inst.flip?-1:1;
  const lx=port.x*fl,ly=port.y;
  return{x:inst.x+lx*Math.cos(rad)-ly*Math.sin(rad),y:inst.y+lx*Math.sin(rad)+ly*Math.cos(rad)};
}

// ════════════════════════════════════════
// RENDER INSTANCE
// ════════════════════════════════════════
function renderInst(inst){
  if(inst.el)inst.el.remove();
  const sym=SYMS.find(s=>s.id===inst.type);if(!sym)return;
  const g=document.createElementNS(NS,'g');
  g.setAttribute('data-id',inst.id);
  applyTF(g,inst);
  sv(g,'rect',{x:-28,y:-28,width:56,height:56,fill:'transparent',stroke:'transparent'});
  const dg=document.createElementNS(NS,'g');
  dg.setAttribute('stroke','#cdd0e0');dg.setAttribute('stroke-width','1.8');
  dg.setAttribute('fill','none');dg.setAttribute('stroke-linecap','round');dg.setAttribute('stroke-linejoin','round');
  sym.draw(dg);g.appendChild(dg);
  // label
  const lbl=document.createElementNS(NS,'text');
  lbl.textContent=inst.label||(sym.id.toUpperCase().slice(0,4));
  lbl.setAttribute('x','0');lbl.setAttribute('y','32');lbl.setAttribute('text-anchor','middle');
  lbl.setAttribute('fill','#17b6c4');lbl.setAttribute('stroke','none');
  lbl.setAttribute('font-size','8');lbl.setAttribute('font-family','ui-monospace,monospace');
  lbl.setAttribute('class','inst-lbl');lbl.style.cursor='text';
  lbl.addEventListener('dblclick',ev=>{ev.stopPropagation();selectInst(inst);showCtx(inst,true);});
  g.appendChild(lbl);
  sv(g,'rect',{x:-30,y:-30,width:60,height:60,rx:6,fill:'none',
    stroke:'#17b6c4','stroke-width':'1','stroke-dasharray':'4,3',opacity:'0',class:'sel-ring',
    filter:'url(#glow)'});
  symLayer.appendChild(g);inst.el=g;
  if(selInst?.id===inst.id)showRing(inst,true);
  bindInst(g,inst);
}
function applyTF(g,inst){g.setAttribute('transform',`translate(${inst.x},${inst.y}) rotate(${inst.rot||0}) scale(${inst.flip?-1:1},1)`);}
function showRing(inst,on){const r=inst.el?.querySelector('.sel-ring');if(r)r.setAttribute('opacity',on?'1':'0');}

// ════════════════════════════════════════
// BIND INSTANCE — drag direct
// ════════════════════════════════════════
function bindInst(g,inst){
  let down=false,startW=null,moved=false;
  g.addEventListener('pointerdown',ev=>{
    if(mode==='delete'){ev.stopPropagation();pushUndo();removeInst(inst);return;}
    if(mode==='wire')return;
    ev.stopPropagation();
    try{ev.currentTarget.setPointerCapture(ev.pointerId);}catch(e){}
    down=true;moved=false;dragging=true;dragInst=inst;dragMoved=false;
    startW=c2w(ev.clientX,ev.clientY);
    dragOff={x:startW.x-inst.x,y:startW.y-inst.y};
    selectInst(inst);
  });
  g.addEventListener('pointermove',ev=>{
    if(!down||!dragging||dragInst!==inst)return;
    const wp=c2w(ev.clientX,ev.clientY);
    inst.x=sn(wp.x-dragOff.x);inst.y=sn(wp.y-dragOff.y);
    applyTF(g,inst);updateWires(inst);
    // live ports
    portLayer.querySelectorAll(`[data-inst="${inst.id}"]`).forEach(e=>e.remove());
    if(mode==='wire'){const sym=SYMS.find(s=>s.id===inst.type);sym?.ports.forEach(p=>renderPort(inst,p));}
    posCtx(inst);
    moved=true;dragMoved=true;
  });
  g.addEventListener('pointerup',ev=>{
    if(!down)return;down=false;
    if(dragging&&dragMoved)pushUndo();
    dragging=false;dragInst=null;
    if(!moved)showCtx(inst);
    else posCtx(inst);
  });
  g.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();selectInst(inst);showCtx(inst);});
}

function selectInst(inst){if(selInst)showRing(selInst,false);selInst=inst;showRing(inst,true);}

function showCtx(inst,focusLabel=false){
  if(!inst)return;

  if(focusLabel)setTimeout(()=>{const i=document.getElementById('ctxInp');i.focus();i.select();},50);
}
function hideCtx(){document.getElementById('ctxPanel').classList.remove('show');}
function posCtx(inst){
  const panel=document.getElementById('ctxPanel');
  if(!panel.classList.contains('show'))return;
  const wrap=document.getElementById('canvasWrap').getBoundingClientRect();
  const sx=inst.x*vpScale+vpX,sy=inst.y*vpScale+vpY;
  let px=sx-97,py=sy-170;
  px=Math.max(4,Math.min(wrap.width-panel.offsetWidth-4,px));
  py=Math.max(4,Math.min(wrap.height-panel.offsetHeight-70,py));

}
function applyLabel(){

function rotSel(d){if(!selInst)return;pushUndo();selInst.rot=((selInst.rot||0)+d+360)%360;applyTF(selInst.el,selInst);updateWires(selInst);refreshPorts();posCtx(selInst);}
function flipSel(){if(!selInst)return;pushUndo();selInst.flip=!selInst.flip;applyTF(selInst.el,selInst);updateWires(selInst);refreshPorts();}
function dupeSel(){if(!selInst)return;pushUndo();const ni={id:nid++,type:selInst.type,x:selInst.x+40,y:selInst.y+40,rot:selInst.rot||0,flip:selInst.flip||false,label:selInst.label||'',el:null};instances.push(ni);renderInst(ni);selectInst(ni);showCtx(ni);updateLegend();}

// PORTS

function refreshPorts(){
  portLayer.innerHTML='';
  if(mode!=='wire')return;
  instances.forEach(inst=>{const sym=SYMS.find(s=>s.id===inst.type);sym?.ports.forEach(p=>renderPort(inst,p));});
}
function renderPort(inst,port){
  const wp=portWorld(inst,port);
  const g=document.createElementNS(NS,'g');
  g.setAttribute('data-inst',inst.id);g.style.cursor='crosshair';
  const isFrom=wireFrom?.inst.id===inst.id&&wireFrom?.port.id===port.id;
  const portColor=port.col||(wireFrom?'#e06020':'#17b6c4');
  const fill=isFrom?'#ffffff':portColor;
  const circle=sv(g,'circle',{cx:wp.x,cy:wp.y,r:5.5,fill,stroke:'#080b12','stroke-width':'1.5',opacity:'.9'});
  // port id label
  sv(g,'text',{x:wp.x,y:wp.y-9,fill:'#17b6c4','font-size':'7','text-anchor':'middle','font-family':'ui-monospace,monospace',stroke:'none'},port.id);
  g.addEventListener('pointerdown',ev=>{ev.stopPropagation();onPortTap(inst,port,wp);});
  g.addEventListener('mouseenter',()=>{circle.setAttribute('r','7.5');});
  g.addEventListener('mouseleave',()=>{circle.setAttribute('r','5.5');});
  portLayer.appendChild(g);
}

// ════════════════════════════════════════
// WIRE
// ════════════════════════════════════════
function onPortTap(inst,port,wp){
  if(!wireFrom){
    wireFrom={inst,port,px:wp.x,py:wp.y};
    tempWire=sv(portLayer,'line',{x1:wp.x,y1:wp.y,x2:wp.x,y2:wp.y,
      stroke:curWC.color,'stroke-width':'2.5','stroke-dasharray':'7,3','stroke-linecap':'round'});
    refreshPorts();
  } else {
    if(wireFrom.inst.id===inst.id&&wireFrom.port.id===port.id)return;
    // auto-set neutre color if port id contains N
    let color=curWC.color;
    const isNeutrePort=wireFrom.port.id.toLowerCase().includes('n')||port.id.toLowerCase().includes('n');
    // keep user color but hint
    pushUndo();
    commitWire(wireFrom.inst,wireFrom.port,inst,port,color);
    if(tempWire){tempWire.remove();tempWire=null;}
    wireFrom=null;refreshPorts();updateLegend();
  }
}
function commitWire(iA,pA,iB,pB,color,forceId){
  const wpA=portWorld(iA,pA),wpB=portWorld(iB,pB);
  const wg=document.createElementNS(NS,'g');
  const line=sv(wg,'line',{x1:wpA.x,y1:wpA.y,x2:wpB.x,y2:wpB.y,
    stroke:color||'#c8c8c8','stroke-width':'2.5','stroke-linecap':'round'});
  sv(wg,'circle',{cx:wpA.x,cy:wpA.y,r:3.5,fill:color||'#c8c8c8',stroke:'none'});
  sv(wg,'circle',{cx:wpB.x,cy:wpB.y,r:3.5,fill:color||'#c8c8c8',stroke:'none'});
  wg.addEventListener('pointerdown',ev=>{
    if(mode==='delete'){ev.stopPropagation();pushUndo();wg.remove();wires=wires.filter(w=>w.el!==wg);updateLegend();toast('Fil supprimé');}
  });
  wg.addEventListener('mouseenter',()=>{line.setAttribute('stroke-width','4');line.setAttribute('filter','url(#glow)');});
  wg.addEventListener('mouseleave',()=>{line.setAttribute('stroke-width','2.5');line.removeAttribute('filter');});
  wireLayer.appendChild(wg);
  wires.push({id:forceId||nid++,fromInst:iA.id,fromPort:pA.id,toInst:iB.id,toPort:pB.id,el:wg,line,color:color||'#c8c8c8'});
}
function updateWires(inst){
  wires.forEach(w=>{
    if(w.fromInst!==inst.id&&w.toInst!==inst.id)return;
    const iA=instances.find(i=>i.id===w.fromInst),iB=instances.find(i=>i.id===w.toInst);
    if(!iA||!iB)return;
    const sA=SYMS.find(s=>s.id===iA.type),sB=SYMS.find(s=>s.id===iB.type);
    const pA=sA.ports.find(p=>p.id===w.fromPort),pB=sB.ports.find(p=>p.id===w.toPort);
    const wpA=portWorld(iA,pA),wpB=portWorld(iB,pB);
    w.line.setAttribute('x1',wpA.x);w.line.setAttribute('y1',wpA.y);
    w.line.setAttribute('x2',wpB.x);w.line.setAttribute('y2',wpB.y);
    const dots=[...w.el.querySelectorAll('circle')];
    if(dots[0]){dots[0].setAttribute('cx',wpA.x);dots[0].setAttribute('cy',wpA.y);}
    if(dots[1]){dots[1].setAttribute('cx',wpB.x);dots[1].setAttribute('cy',wpB.y);}
  });
}

function showGhost(wx,wy){
  if(ghostEl)ghostEl.remove();
  const sym=SYMS.find(s=>s.id===selSymId);if(!sym)return;
  ghostEl=document.createElementNS(NS,'g');
  ghostEl.setAttribute('transform',`translate(${sn(wx)},${sn(wy)})`);
  ghostEl.setAttribute('opacity','.35');ghostEl.setAttribute('pointer-events','none');
  const dg=document.createElementNS(NS,'g');
  dg.setAttribute('stroke','#17b6c4');dg.setAttribute('stroke-width','1.8');
  dg.setAttribute('fill','none');dg.setAttribute('stroke-linecap','round');
  sym.draw(dg);ghostEl.appendChild(dg);
  ghostLayer.appendChild(ghostEl);
}
function placeInst(typeId,x,y){
  pushUndo();
  const inst={id:nid++,type:typeId,x:sn(x),y:sn(y),rot:0,flip:false,label:'',el:null};
  instances.push(inst);renderInst(inst);updateLegend();
  // retour automatique en mode sélection après placement
  setMode('select');
  selectInst(inst);
  return inst;
}
function removeInst(inst){
  wires.filter(w=>w.fromInst===inst.id||w.toInst===inst.id).forEach(w=>w.el.remove());
  wires=wires.filter(w=>w.fromInst!==inst.id&&w.toInst!==inst.id);
  if(inst.el)inst.el.remove();
  instances=instances.filter(i=>i.id!==inst.id);
  if(selInst?.id===inst.id)selInst=null;
  refreshPorts();updateLegend();
}

function updateLegend(){
  const counts={};
  instances.forEach(i=>{const l=SYMS.find(s=>s.id===i.type)?.label||i.type;counts[l]=(counts[l]||0)+1;});
  const div=document.getElementById('legContent');div.innerHTML='';
  if(!Object.keys(counts).length){div.innerHTML='<div style="font-size:10px;color:var(--t3)">Aucun élément</div>';return;}
  Object.entries(counts).forEach(([label,n])=>{
    const row=document.createElement('div');row.className='leg-row';
    row.innerHTML=`<span>${label}</span><span class="leg-n">${n}</span>`;
    div.appendChild(row);
  });
}

function saveLocal(){

    instances:instances.map(i=>({id:i.id,type:i.type,x:i.x,y:i.y,rot:i.rot||0,flip:i.flip||false,label:i.label||''})),
    wires:wires.map(w=>({id:w.id,fromInst:w.fromInst,fromPort:w.fromPort,toInst:w.toInst,toPort:w.toPort,color:w.color})),
    nid,vpX,vpY,vpScale
  };
  localStorage.setItem('chekelec_v6',JSON.stringify(s));
  toast('Sauvegardé ✓','ok');
}
function loadLocal(){
  const raw=localStorage.getItem('chekelec_v6');if(!raw)return false;
  try{
    const s=JSON.parse(raw);
    wireLayer.innerHTML='';symLayer.innerHTML='';portLayer.innerHTML='';
    instances=[];wires=[];selInst=null;nid=s.nid||1;
    vpX=s.vpX||0;vpY=s.vpY||0;vpScale=s.vpScale||1;applyVP();
    s.instances.forEach(d=>{const inst={...d,el:null};instances.push(inst);renderInst(inst);});
    s.wires.forEach(d=>{
      const iA=instances.find(i=>i.id===d.fromInst),iB=instances.find(i=>i.id===d.toInst);
      if(!iA||!iB)return;
      const sA=SYMS.find(s=>s.id===iA.type),sB=SYMS.find(s=>s.id===iB.type);
      const pA=sA?.ports.find(p=>p.id===d.fromPort),pB=sB?.ports.find(p=>p.id===d.toPort);
      if(pA&&pB)commitWire(iA,pA,iB,pB,d.color,d.id);
    });
    refreshPorts();updateLegend();pushUndo();return true;
  }catch(e){console.warn(e);return false;}
}

// ════════════════════════════════════════
// CANVAS EVENTS
// ════════════════════════════════════════
cvs.addEventListener(‘pointerdown’,ev=>{
ptrs[ev.pointerId]={x:ev.clientX,y:ev.clientY};
const pts=Object.values(ptrs);
if(pts.length===2){pinchD=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);pinchS=vpScale;panning=false;return;}
const isCanvas=ev.target.id===‘bgRect’||ev.target===cvs;
if(!isCanvas)return;
const wp=c2w(ev.clientX,ev.clientY);
if(mode===‘place’){
placeInst(selSymId,wp.x,wp.y);
if(ghostEl){ghostEl.remove();ghostEl=null;}
return;
}
if(mode===‘wire’&&wireFrom){wireFrom=null;if(tempWire){tempWire.remove();tempWire=null;}refreshPorts();return;}
// pan
panning=true;panVP={x:vpX,y:vpY};panPtr={x:ev.clientX,y:ev.clientY};
deselectAll();
});

cvs.addEventListener(‘pointermove’,ev=>{
const r=cvs.getBoundingClientRect();
const wx=(ev.clientX-r.left-vpX)/vpScale,wy=(ev.clientY-r.top-vpY)/vpScale;
document.getElementById(‘coords’).textContent=`x:${Math.round(wx)} y:${Math.round(wy)}`;
ptrs[ev.pointerId]={x:ev.clientX,y:ev.clientY};
const pts=Object.values(ptrs);
if(pts.length===2&&pinchD!==null){
const dist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
const ns=Math.max(.15,Math.min(6,pinchS*(dist/pinchD)));
const mx=(pts[0].x+pts[1].x)/2-r.left,my=(pts[0].y+pts[1].y)/2-r.top;
const wx2=(mx-vpX)/vpScale,wy2=(my-vpY)/vpScale;
vpScale=ns;vpX=mx-wx2*vpScale;vpY=my-wy2*vpScale;applyVP();return;
}
if(tempWire&&wireFrom){const wp=c2w(ev.clientX,ev.clientY);tempWire.setAttribute(‘x2’,wp.x);tempWire.setAttribute(‘y2’,wp.y);}
if(mode===‘place’){showGhost(wx,wy);}
else if(ghostEl){ghostEl.remove();ghostEl=null;}
if(panning&&panVP){vpX=panVP.x+(ev.clientX-panPtr.x);vpY=panVP.y+(ev.clientY-panPtr.y);applyVP();}
});

cvs.addEventListener(‘pointerup’,ev=>{
delete ptrs[ev.pointerId];
if(Object.keys(ptrs).length<2)pinchD=null;
panning=false;
});
cvs.addEventListener(‘pointercancel’,ev=>{delete ptrs[ev.pointerId];panning=false;});
cvs.addEventListener(‘wheel’,ev=>{
ev.preventDefault();
const r=cvs.getBoundingClientRect();
const mx=ev.clientX-r.left,my=ev.clientY-r.top;
const wx=(mx-vpX)/vpScale,wy=(my-vpY)/vpScale;
const d=ev.deltaY<0?1.12:.89;
vpScale=Math.max(.15,Math.min(6,vpScale*d));
vpX=mx-wx*vpScale;vpY=my-wy*vpScale;applyVP();
},{passive:false});

document.addEventListener(‘keydown’,ev=>{
const tag=ev.target.tagName;
if(tag===‘INPUT’||tag===‘TEXTAREA’)return;
if(ev.ctrlKey||ev.metaKey){
if(ev.key===‘z’){ev.preventDefault();undo();return;}
if(ev.key===‘y’||(ev.shiftKey&&ev.key===‘z’)){ev.preventDefault();redo();return;}
if(ev.key===‘s’){ev.preventDefault();saveLocal();return;}
if(ev.key===‘d’){ev.preventDefault();dupeSel();return;}
}
if(ev.key===‘Delete’||ev.key===‘Backspace’){if(selInst){pushUndo();removeInst(selInst);}}
if(ev.key===‘r’||ev.key===‘R’)rotSel(90);
if(ev.key===‘e’||ev.key===‘E’)rotSel(-90);
if(ev.key===‘f’||ev.key===‘F’)flipSel();
if(ev.key===‘w’||ev.key===‘W’)setMode(‘wire’);
if(ev.key===‘s’)setMode(‘select’);
if(ev.key===‘x’||ev.key===‘X’)setMode(‘delete’);
if(ev.key===‘Escape’){
wireFrom=null;if(tempWire){tempWire.remove();tempWire=null;}
if(ghostEl){ghostEl.remove();ghostEl=null;}
refreshPorts();setMode(‘select’);hideCtx();
}
});

cw(tb,‘OUT2’,d2,‘IN’,’#cc3311’);cw(d2,‘OUT’,p1,‘L-in’,’#cc3311’);

}
